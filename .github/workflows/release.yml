name: Release

on:
  release:
    types: [published]

permissions:
  contents: write

jobs:
  release:
    name: Build and upload release asset
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Zip integration directory
        run: |
          cd custom_components/sdm_meter
          zip -r ../../sdm_meter.zip .

      - name: Upload zip to release
        uses: svenstaro/upload-release-action@v2
        with:
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          file: sdm_meter.zip
          asset_name: sdm_meter.zip
          tag: ${{ github.ref }}
          overwrite: true
