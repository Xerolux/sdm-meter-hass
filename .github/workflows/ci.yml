name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  quality:
    name: Lint, type-check and test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install tooling
        run: |
          python -m pip install --upgrade pip
          pip install pytest ruff mypy==1.10.0 voluptuous

      - name: Ruff
        run: ruff check --no-cache custom_components tests

      - name: MyPy
        run: mypy custom_components/sdm_meter/flow_helpers.py custom_components/sdm_meter/register_map.py tests

      - name: Pytest
        run: pytest -q -o cache_dir=/tmp/pytest_cache
